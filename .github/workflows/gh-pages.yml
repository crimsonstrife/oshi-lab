name: Deploy Astro to GitHub Pages

on:
  push:
    branches:
      - production

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Debug npm env/config
        run: |
          echo "registry=$(npm config get registry)"
          echo "userconfig=$(npm config get userconfig)"
          env | sort | grep -iE 'NODE_AUTH_TOKEN|NPM_TOKEN|NPM_CONFIG|npm_config|_auth|registry' || true
          npm config list -l | sed -E 's/(_authToken=).*/\1[redacted]/; s/(_password=).*/\1[redacted]/'

      - name: Install dependencies
        run: npm ci --loglevel verbose

      - name: Dump npm debug log
        if: always()
        run: |
          ls -t /home/runner/.npm/_logs/*debug-0.log | head -n 1 | xargs -r sed -n '1,220p'

      - name: Compute PUBLIC_APP_VERSION from package.json
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          {
            echo "PUBLIC_APP_VERSION=$VERSION"
          } >> "$GITHUB_ENV"

      - name: Build Astro site
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./dist
          cname: oshi-lab.app
