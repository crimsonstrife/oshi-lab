name: Smoke Tests

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest (smoke)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Compute PUBLIC_APP_VERSION
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "PUBLIC_APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Run tests
        env:
          CI: true
        run: npm test